<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PagePatch</title>
    <link rel="stylesheet" href="icons.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-container">
      <div class="bg-overlay" aria-hidden="true">
        <div class="bg-scanlines"></div>
        <div class="bg-gradient"></div>
      </div>

      <header class="header">
        <div class="brand">
          <div class="brand-icon">
            <img src="../../icons/icon128.png" alt="" width="28" height="28" aria-hidden="true" />
          </div>
          <h1>PagePatch</h1>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
            <span class="icon" id="theme-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></span>
          </button>
          <span id="state" class="status-pill">READ-ONLY</span>
        </div>
      </header>

      <div class="content">
        <section class="file-card" aria-label="Current file">
          <div class="file-card-texture" aria-hidden="true"></div>
          <span class="file-label">FILE</span>
          <div id="filename" class="file-name">—</div>
          <div id="file-state" class="file-state">
            <span class="dirty-indicator" aria-hidden="true"></span>
            <span>Read-only</span>
          </div>
        </section>

        <div class="controls">
          <div class="toggle-group">
            <div class="toggle-row">
              <span class="toggle-label">Edit mode</span>
              <label class="switch" for="edit-toggle">
                <input type="checkbox" id="edit-toggle" />
                <div class="switch-track"></div>
                <div class="switch-thumb"></div>
              </label>
            </div>
            <p id="hint" class="hint"></p>
          </div>

          <div class="action-buttons">
            <div class="export-wrapper">
              <button id="export-btn" class="btn btn-ghost">Export ▾</button>
              <div id="export-menu" class="export-menu" hidden>
                <button class="export-item" data-format="pdf">
                  Export PDF
                </button>
              </div>
            </div>
            <button id="save" class="btn btn-primary" disabled>Save</button>
          </div>
        </div>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
