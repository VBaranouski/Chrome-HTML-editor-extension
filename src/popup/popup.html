<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Local HTML Editor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <h1>Local HTML Editor</h1>
    </header>

    <section class="status">
      <div class="status-row">
        <span class="status-label">File</span>
        <span id="filename" class="status-value" title="">—</span>
      </div>
      <div class="status-row">
        <span class="status-label">State</span>
        <span id="state" class="status-value">read-only</span>
      </div>
    </section>

    <section class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="edit-toggle" />
        <span class="slider"></span>
      </label>
      <span class="toggle-label">Edit mode</span>
    </section>

    <section class="actions">
      <button id="save" class="btn btn-primary" disabled>Save</button>
      <button id="save-as" class="btn" disabled>Save As&hellip;</button>
    </section>

    <p id="hint" class="hint"></p>

    <script src="popup.js"></script>
  </body>
</html>
